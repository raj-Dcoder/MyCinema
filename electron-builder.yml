appId: com.mycinema.app
productName: MyCinema
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
asarUnpack:
  - "node_modules/ffmpeg-static/**/*"
  - "node_modules/ffprobe-static/**/*"
  - "node_modules/better-sqlite3/**/*"
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: raj-Dcoder
  repo: MyCinema
  releaseType: release
