appId: com.mycinema.app
productName: MyCinema
directories:
  output: dist
  buildResources: build
extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: build/icon.png
    to: icon.png
files:
  - out/**/*
  - package.json
asar: true
asarUnpack:
  - "node_modules/ffmpeg-static/**/*"
  - "node_modules/ffprobe-static/**/*"
  - "node_modules/better-sqlite3/**/*"
fileAssociations:
  - ext:
      - mp4
      - mkv
      - avi
      - mov
      - webm
    name: Video File
    role: Viewer
protocols:
  - name: MyCinema Link
    schemes:
      - mycinema
win:
  icon: build/icon.ico
  target: nsis
  verifyUpdateCodeSignature: true
  signingHashAlgorithms:
    - sha256
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: raj-Dcoder
  repo: MyCinema
  releaseType: release
